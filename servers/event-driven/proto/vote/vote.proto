syntax = "proto3";

package vote;

option go_package = "event-driven/proto/gen/vote;vote";

import "google/protobuf/empty.proto";

service VoteService {
    rpc CastVote(CastVoteRequest) returns (google.protobuf.Empty);
    rpc SubscribeLeaderboard(SubscribeLeaderboardRequest) returns (stream LeaderboardUpdate);
}

message CastVoteRequest {
    string poll_id = 1;
    string option_id = 2;
    string user_id = 3;
}

message LeaderboardEntry {
    string option_id = 1;
    string text = 2;
    int64 votes = 3;
    int32 rank = 4;
}

message SubscribeLeaderboardRequest {
    string poll_id = 1;
    int64 top_n = 2; // top n first options
}

message LeaderboardUpdate {
    repeated LeaderboardEntry entries = 1;
}

